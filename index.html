    <section class="hero-carousel" id="carousel-section">

      <button class="carousel-btn next-btn" id="nextBtn">❯</button>

    <main class="container">
      <section class="boards-section">
        <div class="board news-board">
          <div class="board-header">
            <h2>📢 最新消息</h2>

        <div class="board edu-board">

      <section class="video-section">
        <div class="board-header">

        <div class="video-grid">

            <div class="video-thumbnail">健康講座：吃得對，活得好</div>

          </div>
          <div class="video-card">

            <div class="video-title">一分鐘看懂連續血糖監測</div>
          </div>
          <div class="video-card">
            <div class="video-thumbnail">透析中心導覽</div>

    <footer class="footer">

    </footer>
    <button id="backToTopBtn" class="back-to-top" title="回到頁頂">⬆</button>
    <script>
      // 抓取需要的 DOM 元素
      const track = document.getElementById("carouselTrack");
      const slides = Array.from(track.children);
      const nextBtn = document.getElementById("nextBtn");
      const prevBtn = document.getElementById("prevBtn");
      const dots = Array.from(document.querySelectorAll(".dot"));
      const carouselSection = document.getElementById("carousel-section");

      let currentIndex = 0; // 記錄目前顯示第幾張圖 (從 0 開始)
      const slideCount = slides.length; // 總共有幾張圖 (4)
      let autoPlayInterval; // 用來儲存定時器的變數

      // 核心功能：根據索引值移動軌道
      function moveToSlide(index) {
        // 處理循環邏輯 (若到最後一張的下一張，回到第一張；反之亦然)
        if (index < 0) {
          currentIndex = slideCount - 1;
        } else if (index >= slideCount) {
          currentIndex = 0;
        } else {
          currentIndex = index;
        }

        // 計算移動的距離 (-100vw, -200vw 等) 並套用 CSS 變形
        const amountToMove = -(currentIndex * 100);
        track.style.transform = `translateX(${amountToMove}vw)`;

        // 更新下方圓點的狀態
        updateDots(currentIndex);
      }

      // 更新圓點樣式
      function updateDots(index) {
        dots.forEach((dot) => dot.classList.remove("active"));
        dots[index].classList.add("active");
      }

      // 定時自動輪播功能
      function startAutoPlay() {
        autoPlayInterval = setInterval(() => {
          moveToSlide(currentIndex + 1);
        }, 20000); // 4000 毫秒 = 4 秒
      }

      function stopAutoPlay() {
        clearInterval(autoPlayInterval);
      }

      // --- 設定事件監聽器 ---

      // 點擊右邊按鈕
      nextBtn.addEventListener("click", () => {
        moveToSlide(currentIndex + 1);
        stopAutoPlay();
        startAutoPlay(); // 點擊後重新計算時間
      });

      // 點擊左邊按鈕
      prevBtn.addEventListener("click", () => {
        moveToSlide(currentIndex - 1);
        stopAutoPlay();
        startAutoPlay();
      });

      // 點擊圓點切換
      dots.forEach((dot, index) => {
        dot.addEventListener("click", () => {
          moveToSlide(index);
          stopAutoPlay();
          startAutoPlay();
        });
      });

      // 滑鼠移到圖片上時暫停輪播，移開時恢復 (優化使用者體驗)
      carouselSection.addEventListener("mouseenter", stopAutoPlay);
      carouselSection.addEventListener("mouseleave", startAutoPlay);

      // 網頁載入時啟動自動輪播
      startAutoPlay();

      // =========================================
      // 首頁：動態載入 JSON 最新消息 (取前 4 筆)
      // =========================================
      document.addEventListener("DOMContentLoaded", () => {
        const indexNewsList = document.getElementById("index-news-list");

        if (indexNewsList) {
          // 讀取我們之前建立的資料庫
          fetch("news-data.json")
            .then((response) => {
              if (!response.ok) throw new Error("無法讀取資料庫");
              return response.json();
            })
            .then((data) => {
              indexNewsList.innerHTML = ""; // 清空預設內容

              // 擷取陣列的前 4 筆資料 (最新的 4 篇)
              const topNews = data.slice(0, 4);

              // 將這 4 筆資料轉換成 HTML 並塞入首頁
              topNews.forEach((item) => {
                const liItem = `
                              <li>
                                  <div style="display: flex; gap: 10px; align-items: center;">
                                      <span class="news-tag ${item.tagClass}" style="font-size: 0.75rem; padding: 2px 8px;">${item.category}</span>
                                      <span class="news-date" style="margin: 0;">${item.date}</span>
                                  </div>
                                  
                                  <a href="article.html?id=${item.id}">${item.title}</a>
                              </li>
                          `;
                indexNewsList.insertAdjacentHTML("beforeend", liItem);
              });
            })
            .catch((error) => {
              console.error("載入失敗:", error);
              indexNewsList.innerHTML = "<li>資料載入中或發生錯誤...</li>";
            });
        }
      });

      // =========================================
      // 首頁：動態載入 JSON 衛教專區 (自動取最新 4 筆)
      // =========================================
      const indexEduGrid = document.getElementById("index-edu-grid");

      if (indexEduGrid) {
        // 定義我們要抓取的衛教分類名稱
        const educationCategories = [
          "糖尿病專區",
          "腎臟專區",
          "代謝症候群專區",
          "護理專區",
          "藥物專區",
          "眼睛保健專區",
          "心血管專區"
        ];

        // 讀取全站共用的 JSON 資料庫 (加上時間戳記徹底打破快取)
        fetch("news-data.json?v=" + new Date().getTime())
          .then((response) => {
            if (!response.ok) throw new Error("無法讀取資料庫");
            return response.json();
          })
          .then((data) => {
            indexEduGrid.innerHTML = ""; // 先清空骨架

            // 1. 【關鍵過濾】：從資料庫中，只挑選出分類屬於「衛教專區」的文章
            const eduArticles = data.filter(item => educationCategories.includes(item.category));

            // 2. 【擷取前 4 筆】：只拿最新上傳的前 4 篇衛教文章
            const topEdu = eduArticles.slice(0, 4);

            // 3. 【動態生成卡片】：將資料轉換為 HTML 塞入首頁
            topEdu.forEach((item) => {
              const cardHTML = `
                <a href="article.html?id=${item.id}" class="edu-card">
                  <div class="edu-tag ${item.tagClass}">${item.category}</div>
                  <h3>${item.title}</h3>
                </a>
              `;
              indexEduGrid.insertAdjacentHTML("beforeend", cardHTML);
            });

            // 防呆機制：如果 JSON 裡目前沒有任何衛教文章
            if (topEdu.length === 0) {
              indexEduGrid.innerHTML = "<p style='color:#888; grid-column: 1/-1; text-align:center; padding: 20px;'>目前暫無衛教文章發表</p>";
            }
          })
          .catch((error) => {
            console.error("衛教專區載入失敗:", error);
            indexEduGrid.innerHTML = "<p style='color:red; grid-column: 1/-1; text-align:center; padding: 20px;'>衛教專區載入中或發生異常...</p>";
          });
      }
      // =========================================
      // 快速回到頁頂功能
      // =========================================
      const backToTopBtn = document.getElementById("backToTopBtn");

      if (backToTopBtn) {
        // 監聽網頁滾動事件
        window.addEventListener("scroll", () => {
          // 當往下滾動超過 300px 時，幫按鈕加上 'show' 讓它浮現
          if (window.scrollY > 300) {
            backToTopBtn.classList.add("show");
          } else {
            // 滾回頂部時，移除 'show' 讓它隱藏
            backToTopBtn.classList.remove("show");
          }
        });

        // 監聽按鈕點擊事件
        backToTopBtn.addEventListener("click", () => {
          window.scrollTo({
            top: 0,
            behavior: "smooth", // 讓畫面像滑行一樣平滑滾動上去，而不是瞬間跳躍
          });
        });
      }
    </script>
  </body>
