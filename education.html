<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>衛教專區總覽- 活力醫療中心</title>
    <link rel="stylesheet" href="style.css?v=7" />
  </head>
  <body>
    <header class="navbar">
      <div class="container nav-container">
        <a href="https://homemade0726.neocities.org/" class="logo">
          <span class="logo-icon">✚</span> 活力醫療
        </a>
        <input type="checkbox" id="menu-toggle" class="menu-checkbox" />
        <label for="menu-toggle" class="menu-btn">☰</label>

        <nav class="nav-links">
          <a href="#about">關於我們</a>
          <a href="#hours">門診時間</a>

          <div class="dropdown">
            <a href="#team" class="dropdown-toggle">醫療團隊 ▾</a>

            <input type="checkbox" id="team-toggle" class="dropdown-checkbox" />
            <label for="team-toggle" class="dropdown-label">醫療團隊 ▾</label>

            <div class="dropdown-menu">
              <div class="dropdown-grid">
                <a href="#">新陳代謝科</a>
                <a href="#">神經內科</a>
                <a href="#">腎臟內科</a>
                <a href="#">眼科</a>
                <a href="#">泌尿科</a>
                <a href="#">肝膽腸胃科</a>
                <a href="#">心臟內科</a>
                <a href="#">胸腔內科</a>
                <a href="#">居家護理師</a>
                <a href="#">護理衛教師</a>
                <a href="#">護理師</a>
                <a href="#">營養衛教師</a>
                <a href="#">血液透析護理師</a>
                <a href="#">醫檢師</a>
                <a href="#">心理師</a>
                <a href="#">藥師</a>
              </div>
            </div>
          </div>

          <a href="#dialysis">智能透析</a>
        </nav>
      </div>
    </header>

    <div class="page-header">
      <div class="container">
        <h1>💡 衛教專區</h1>
        <p>掌握診所最新動態、門診異動與健康活動資訊</p>
      </div>
    </div>

    <main class="container page-content">
      <div class="filter-tabs">
        <a href="#" class="tab active" data-filter="all">全部消息</a>
        <a href="#" class="tab" data-filter="糖尿病專區">糖尿病專區</a>
        <a href="#" class="tab" data-filter="代謝症候群專區">代謝症候群專區</a>
        <a href="#" class="tab" data-filter="腎臟專區">腎臟專區</a>
        <a href="#" class="tab" data-filter="護理專區">護理專區</a>
        <a href="#" class="tab" data-filter="藥物專區">藥物專區</a>
        <a href="#" class="tab" data-filter="眼睛保健專區">眼睛保健專區</a>
        <a href="#" class="tab" data-filter="心血管專區">心血管專區</a>
      </div>

      <div class="full-news-list" id="news-container"></div>

      <div class="pagination">
        <a href="#" class="page-btn disabled">上一頁</a>
        <a href="#" class="page-num active">1</a>
        <a href="#" class="page-num">2</a>
        <a href="#" class="page-num">3</a>
        <a href="#" class="page-btn">下一頁</a>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <p>&copy; 2026 活力醫療機構 All Rights Reserved.</p>
      </div>
    </footer>
    <button id="backToTopBtn" class="back-to-top" title="回到頁頂">⬆</button>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const fullNewsList = document.getElementById("news-container");
        const tabs = document.querySelectorAll(".tab");
        let allArticles = []; // 用來儲存從 JSON 抓來的所有「衛教」文章

        // 定義哪些分類屬於「衛教專區」（這很重要，用來排除最新消息）
        const educationCategories = [
          "糖尿病專區",
          "腎臟專區",
          "代謝症候群專區",
          "護理專區",
          "藥物專區",
          "眼睛保健專區",
          "心血管專區",
        ];

        // 讀取 JSON 資料庫 (加上時間戳記避免快取)
        fetch("news-data.json?v=" + new Date().getTime())
          .then((response) => {
            if (!response.ok) throw new Error("無法讀取資料庫");
            return response.json();
          })
          .then((data) => {
            // 【關鍵過濾】：只挑選分類屬於 educationCategories 的文章！
            allArticles = data.filter((item) =>
              educationCategories.includes(item.category),
            );

            // 預設渲染全部的衛教文章
            renderArticles(allArticles);
          })
          .catch((error) => {
            console.error("載入失敗:", error);
            fullNewsList.innerHTML =
              "<div style='text-align:center; padding: 20px; color: red;'>資料載入失敗，請稍後再試。</div>";
          });

        // 渲染文章列表的函數
        function renderArticles(articlesToRender) {
          fullNewsList.innerHTML = ""; // 先清空列表

          if (articlesToRender.length === 0) {
            fullNewsList.innerHTML =
              "<div style='text-align:center; padding: 20px; color: #888;'>此分類目前沒有文章。</div>";
            return;
          }

          articlesToRender.forEach((item) => {
            // 拆解日期 (例如 "2026/05/20" 變成 "20" 和 "2026/05")
            const dateParts = item.date.split("/");
            const day = dateParts[2];
            const yearMonth = `${dateParts[0]}/${dateParts[1]}`;

            // 自動檢查是否有圖片，沒有就用預設的佔位圖
            const thumbnail =
              item.image && item.image.trim() !== ""
                ? `<img src="${item.image}" alt="${item.title}" style="width: 150px; height: 100px; object-fit: cover; border-radius: 8px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">`
                : `<div style="width: 150px; height: 100px; background-color: #f0f4f8; border-radius: 8px; flex-shrink: 0; display:flex; justify-content:center; align-items:center; color:#ccc;"><span style="font-size:24px;">💡</span></div>`;

            // 組合 HTML (加入了縮圖設計，並全部導向共用的 article.html)
            const newsItemHTML = `
                <a href="article.html?id=${item.id}" class="news-item" style="align-items: center;">
                    <div class="news-date-badge">
                        <span class="day">${day}</span>
                        <span class="year-month">${yearMonth}</span>
                    </div>
                    
                    ${thumbnail}
                    
                    <div class="news-content-box">
                        <div class="news-meta">
                            <span class="news-tag ${item.tagClass}">${item.category}</span>
                        </div>
                        <h2 class="news-title">${item.title}</h2>
                        <div class="news-excerpt">${item.excerpt}</div>
                    </div>
                    <div class="news-arrow">❯</div>
                </a>
            `;
            fullNewsList.insertAdjacentHTML("beforeend", newsItemHTML);
          });
        }

        // 綁定標籤點擊事件 (分類過濾功能)
        tabs.forEach((tab) => {
          tab.addEventListener("click", () => {
            // 移除所有標籤的 active 狀態
            tabs.forEach((t) => t.classList.remove("active"));
            // 為點擊的標籤加上 active
            tab.classList.add("active");

            const filterValue = tab.getAttribute("data-filter");

            // 根據點選的分類過濾文章
            if (filterValue === "all") {
              renderArticles(allArticles);
            } else {
              const filteredArticles = allArticles.filter(
                (item) => item.category === filterValue,
              );
              renderArticles(filteredArticles);
            }
          });
        });
      });

      // =========================================
      // 快速回到頁頂功能
      // =========================================
      const backToTopBtn = document.getElementById("backToTopBtn");

      if (backToTopBtn) {
        // 監聽網頁滾動事件
        window.addEventListener("scroll", () => {
          // 當往下滾動超過 300px 時，幫按鈕加上 'show' 讓它浮現
          if (window.scrollY > 300) {
            backToTopBtn.classList.add("show");
          } else {
            // 滾回頂部時，移除 'show' 讓它隱藏
            backToTopBtn.classList.remove("show");
          }
        });

        // 監聽按鈕點擊事件
        backToTopBtn.addEventListener("click", () => {
          window.scrollTo({
            top: 0,
            behavior: "smooth", // 讓畫面像滑行一樣平滑滾動上去，而不是瞬間跳躍
          });
        });
      }
    </script>
  </body>
</html>
